<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent V2 - Next Generation AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #10b981; --secondary: #059669; --bg-dark: #0a0a0f; --bg-secondary: #12121a; --bg-tertiary: #1a1a25; --text-primary: #f8fafc; --text-secondary: #94a3b8; --border: #2e2e3a; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
    .app-container { display: flex; height: 100vh; }
    .sidebar { width: 280px; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; }
    .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 2rem; display: flex; align-items: center; gap: 10px; }
    .agent-status { background: var(--bg-tertiary); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; }
    .status-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .agent-status p { font-size: 0.9rem; }
    .tools-list { flex: 1; overflow-y: auto; }
    .tool-category { margin-bottom: 1.5rem; }
    .tool-category h4 { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; padding-left: 0.5rem; }
    .tool-item { display: flex; align-items: center; gap: 12px; padding: 0.75rem 1rem; border-radius: 10px; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
    .tool-item:hover, .tool-item.active { background: rgba(16, 185, 129, 0.15); color: var(--primary); }
    .tool-item i { width: 20px; }
    .main-chat { flex: 1; display: flex; flex-direction: column; }
    .chat-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .chat-header h2 { font-size: 1.25rem; }
    .header-actions { display: flex; gap: 1rem; }
    .icon-btn { width: 40px; height: 40px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .chat-messages { flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; }
    .message { display: flex; gap: 1rem; max-width: 80%; }
    .message.ai { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message-avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .message.user .message-avatar { background: var(--secondary); }
    .message-content { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 1rem 1.25rem; line-height: 1.6; }
    .message.user .message-content { background: var(--bg-tertiary); }
    .chat-input-area { padding: 1.5rem; border-top: 1px solid var(--border); }
    .chat-input-container { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 0.75rem; display: flex; align-items: flex-end; gap: 0.75rem; }
    .chat-input-container textarea { flex: 1; background: none; border: none; color: var(--text-primary); font-size: 0.95rem; resize: none; outline: none; min-height: 24px; max-height: 120px; font-family: inherit; }
    .chat-input-container button { width: 44px; height: 44px; background: var(--primary); border: none; border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all 0.2s; }
    .chat-input-container button:hover { background: var(--secondary); transform: scale(1.05); }
    .quick-actions { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .quick-action { padding: 0.5rem 1rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 20px; font-size: 0.8rem; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
    .quick-action:hover { border-color: var(--primary); color: var(--primary); }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo"><i class="fas fa-robot"></i> AI Agent V2</div>
      <div class="agent-status">
        <p><span class="status-dot"></span><strong>Online</strong> - Ready to help</p>
      </div>
      <div class="tools-list">
        <div class="tool-category">
          <h4>Capabilities</h4>
          <div class="tool-item active"><i class="fas fa-comment"></i> Chat</div>
          <div class="tool-item"><i class="fas fa-code"></i> Code</div>
          <div class="tool-item"><i class="fas fa-image"></i> Image Gen</div>
          <div class="tool-item"><i class="fas fa-file-alt"></i> Analyze</div>
        </div>
        <div class="tool-category">
          <h4>Tools</h4>
          <div class="tool-item"><i class="fas fa-calculator"></i> Calculator</div>
          <div class="tool-item"><i class="fas fa-language"></i> Translate</div>
          <div class="tool-item"><i class="fas fa-search"></i> Search</div>
        </div>
        <div class="tool-category">
          <h4>Settings</h4>
          <div class="tool-item"><i class="fas fa-cog"></i> Preferences</div>
          <div class="tool-item"><i class="fas fa-history"></i> History</div>
        </div>
      </div>
    </aside>
    <main class="main-chat">
      <div class="chat-header">
        <h2>AI Assistant</h2>
        <div class="header-actions">
          <button class="icon-btn"><i class="fas fa-cog"></i></button>
          <button class="icon-btn"><i class="fas fa-expand"></i></button>
        </div>
      </div>
      <div class="chat-messages">
        <div class="message ai">
          <div class="message-avatar"><i class="fas fa-robot"></i></div>
          <div class="message-content">Hello! I'm your AI Assistant V2. I can help you with coding, writing, analysis, and much more. How can I assist you today?</div>
        </div>
      </div>
      <div class="chat-input-area">
        <div class="quick-actions">
          <button class="quick-action">Write code</button>
          <button class="quick-action">Analyze data</button>
          <button class="quick-action">Explain concept</button>
          <button class="quick-action">Summarize text</button>
        </div>
        <div class="chat-input-container">
          <textarea placeholder="Type your message..." rows="1"></textarea>
          <button><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
