<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub - Central Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #6366f1; --secondary: #8b5cf6; --bg-dark: #0a0a0f; --bg-secondary: #12121a; --bg-tertiary: #1a1a25; --text-primary: #f8fafc; --text-secondary: #94a3b8; --border: #2e2e3a; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .hub-container { text-align: center; padding: 2rem; }
    .hub-icon { font-size: 4rem; margin-bottom: 1rem; }
    .hub-container h1 { font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hub-container p { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 2rem; }
    .quick-links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .quick-link { padding: 1rem 2rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); text-decoration: none; transition: all 0.3s; }
    .quick-link:hover { border-color: var(--primary); transform: translateY(-4px); }
  </style>
</head>
<body>
  <div class="hub-container">
    <div class="hub-icon">🔗</div>
    <h1>BAZ Hub</h1>
    <p>Your central access point to all BAZ services</p>
    <div class="quick-links">
      <a href="#" class="quick-link">🎵 Music</a>
      <a href="#" class="quick-link">🎬 Video</a>
      <a href="#" class="quick-link">🛒 Shop</a>
      <a href="#" class="quick-link">🤖 AI Tools</a>
    </div>
  </div>
</body>
</html>
