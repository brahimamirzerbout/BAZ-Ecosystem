<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foto - Photo Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #a855f7; --bg-dark: #0a0a0f; --bg-secondary: #12121a; --bg-tertiary: #1a1a25; --text-primary: #c; --textf8faf-secondary: #94a3b8; --border: #2e2e3a; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
    .app-container { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 1.5rem; }
    .logo { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-bottom: 2rem; }
    .nav-item { padding: 0.75rem 1rem; border-radius: 10px; cursor: pointer; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .nav-item:hover, .nav-item.active { background: rgba(168, 85, 247, 0.15); color: var(--primary); }
    .main-content { flex: 1; padding: 2rem; }
    .header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .btn { padding: 0.75rem 1.5rem; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; background: var(--primary); color: white; }
    .gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .photo-item { aspect-ratio: 1; background: var(--bg-secondary); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s; position: relative; }
    .photo-item:hover { transform: scale(1.05); }
    .photo-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    @media (max-width: 768px) { .sidebar { display: none; } .gallery { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo"><i class="fas fa-camera"></i> Foto</div>
      <div class="nav-item active">All Photos</div>
      <div class="nav-item">Albums</div>
      <div class="nav-item">Favorites</div>
      <div class="nav-item">Trash</div>
    </aside>
    <main class="main-content">
      <div class="header">
        <h1>Photo Gallery</h1>
        <button class="btn"><i class="fas fa-upload"></i> Upload</button>
      </div>
      <div class="gallery">
        <div class="photo-item"><div class="photo-placeholder" style="background: linear-gradient(135deg, #667eea, #764ba2);">🌅</div></div>
        <div class="photo-item"><div class="photo-placeholder" style="background: linear-gradient(135deg, #f093fb, #f5576c);">🌸</div></div>
        <div class="photo-item"><div class="photo-placeholder" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">🏖️</div></div>
        <div class="photo-item"><div class="photo-placeholder" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">🌿</div></div>
        <div class="photo-item"><div class="photo-placeholder" style="background: linear-gradient(135deg, #fa709a, #fee140);">🌸</div></div>
        <div class="photo-item"><div class="photo-placeholder" style="background: linear-gradient(135deg, #a8edea, #fed6e3);">🌺</div></div>
        <div class="photo-item"><div class="photo-placeholder" style="background: linear-gradient(135deg, #ff9a9e, #fecfef);">❤️</div></div>
        <div class="photo-item"><div class="photo-placeholder" style="background: linear-gradient(135deg, #ffecd2, #fcb69f);">☀️</div></div>
      </div>
    </main>
  </div>
</body>
</html>
